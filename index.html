const FR = {
  bodies: {
    llm: "Un r\u00e9seau neuronal entra\u00een\u00e9 sur d'immenses corpus de textes pour pr\u00e9dire et g\u00e9n\u00e9rer du langage. Le fondement des assistants IA modernes comme Claude, GPT et Gemini.",
    transformer: "L'architecture de r\u00e9seau neuronal introduite en 2017 (\u00ab Attention is All You Need \u00bb) qui alimente pratiquement tous les LLMs modernes. Utilise l'auto-attention pour traiter les tokens en parall\u00e8le, comprenant les relations sur l'ensemble du contexte.",
    attention: "L'op\u00e9ration centrale d'un Transformer qui permet \u00e0 chaque token de \u00ab regarder \u00bb tous les autres tokens et de pond\u00e9rer leur pertinence. C'est ce qui donne aux LLMs leur capacit\u00e9 \u00e0 comprendre les d\u00e9pendances \u00e0 longue port\u00e9e dans le texte.",
    "ffn-layer": "Le deuxi\u00e8me composant majeur de chaque bloc Transformer, apr\u00e8s la couche d'attention. Alors que l'attention permet aux tokens de communiquer entre eux, la FFN traite chaque token ind\u00e9pendamment via deux transformations lin\u00e9aires avec une non-lin\u00e9arit\u00e9 entre elles. C'est l\u00e0 que la plupart de la \u00ab connaissance \u00bb du mod\u00e8le est r\u00e9ellement stock\u00e9e : les recherches montrent que les associations factuelles (Paris \u2192 France) vivent dans les poids FFN, pas dans l'attention. Dans un LLM typique, les couches FFN repr\u00e9sentent environ 2/3 de tous les param\u00e8tres. Les architectures MoE remplacent sp\u00e9cifiquement la couche FFN par un pool d'experts FFN et un routeur, donc comprendre la FFN est la cl\u00e9 pour comprendre le MoE.",
    "model-parameters": "Les valeurs num\u00e9riques \u00e0 l'int\u00e9rieur d'un mod\u00e8le : des milliards de nombres \u00e0 virgule flottante qui encodent tout ce que le mod\u00e8le a appris pendant l'entra\u00eenement. Un mod\u00e8le \u00ab 70B \u00bb a 70 milliards de param\u00e8tres. Plus de param\u00e8tres ne signifie pas toujours de meilleures performances.",
    tokenizer: "Le syst\u00e8me qui convertit le texte brut en tokens : de petits morceaux (mots, sous-mots ou caract\u00e8res) que le mod\u00e8le traite r\u00e9ellement. \u00ab Hello world \u00bb pourrait \u00eatre 2 tokens ; un mot rare pourrait \u00eatre divis\u00e9 en 4. Le nombre de tokens impacte directement le co\u00fbt et les limites de contexte.",
    "dense-model": "Un mod\u00e8le o\u00f9 chaque param\u00e8tre est activ\u00e9 pour chaque token : l'architecture standard, par opposition au Mixture of Experts. GPT-2, LLaMA et Claude sont des mod\u00e8les denses. Plus simples \u00e0 entra\u00eener et \u00e0 raisonner, mais le co\u00fbt de calcul \u00e9volue directement avec le nombre de param\u00e8tres, contrairement au MoE.",
    moe: "Une architecture o\u00f9 le mod\u00e8le contient de nombreux sous-r\u00e9seaux sp\u00e9cialis\u00e9s (\u00ab experts \u00bb) et un routeur qui n'en active que quelques-uns par token. Utilis\u00e9e dans GPT-4, Mixtral et d'autres : permet d'atteindre des nombres de param\u00e8tres massifs pour une fraction du co\u00fbt de calcul.",
    multimodal: "Des mod\u00e8les capables de traiter et de raisonner sur plusieurs types de donn\u00e9es : texte, images, audio, vid\u00e9o, code. Claude 3, GPT-4o et Gemini sont tous multimodaux. N\u00e9cessite l'encodage de diff\u00e9rentes modalit\u00e9s dans un espace latent partag\u00e9 sur lequel le LLM peut porter son attention.",
    slm: "Un mod\u00e8le de langage suffisamment petit pour fonctionner sur du mat\u00e9riel grand public ou \u00e0 la p\u00e9riph\u00e9rie : g\u00e9n\u00e9ralement moins de 7B param\u00e8tres. Des mod\u00e8les comme Phi-3, Gemma 2B et Mistral 7B \u00e9changent des capacit\u00e9s brutes contre un co\u00fbt d'inf\u00e9rence consid\u00e9rablement r\u00e9duit et la possibilit\u00e9 de fonctionner localement sans cluster GPU. La distillation est la technique principale utilis\u00e9e pour construire des SLMs capables \u00e0 partir de mod\u00e8les enseignants plus grands.",
    "kv-cache": "Une optimisation de performance qui sauvegarde les calculs d'attention interm\u00e9diaires (cl\u00e9s et valeurs) pour les tokens d\u00e9j\u00e0 trait\u00e9s, afin que le mod\u00e8le ne les recalcule pas \u00e0 chaque nouveau token. Critique pour une inf\u00e9rence rapide dans des contextes longs.",
    ram: "En IA, la RAM (et la VRAM GPU) est le principal goulot d'\u00e9tranglement pour l'ex\u00e9cution des mod\u00e8les. Un mod\u00e8le 70B en pr\u00e9cision 16 bits n\u00e9cessite environ 140 Go de VRAM. La quantification est la technique principale pour r\u00e9duire cette empreinte.",
    quantization: "Compression d'un mod\u00e8le en r\u00e9duisant la pr\u00e9cision num\u00e9rique de ses poids : par exemple, de flottants 32 bits \u00e0 des entiers 4 bits. \u00c9change une l\u00e9g\u00e8re perte de pr\u00e9cision contre une m\u00e9moire consid\u00e9rablement r\u00e9duite et une inf\u00e9rence plus rapide. Utilis\u00e9 pour ex\u00e9cuter de grands mod\u00e8les sur du mat\u00e9riel grand public.",
    inference: "L'action d'ex\u00e9cuter un mod\u00e8le entra\u00een\u00e9 pour g\u00e9n\u00e9rer une sortie, par opposition \u00e0 l'entra\u00eenement. Lorsque vous envoyez un message \u00e0 Claude, c'est de l'inf\u00e9rence. Optimiser l'inf\u00e9rence (vitesse, co\u00fbt, m\u00e9moire) est un d\u00e9fi d'ing\u00e9nierie majeur \u00e0 grande \u00e9chelle.",
    vector: "Une liste de nombres (par exemple 1536 flottants) qui encode le sens s\u00e9mantique d'un texte. Les textes avec un sens similaire ont des vecteurs num\u00e9riquement proches les uns des autres. La colonne vert\u00e9brale de la recherche s\u00e9mantique et du RAG.",
    embedding: "Le processus de conversion de texte, d'images ou d'autres donn\u00e9es en une repr\u00e9sentation vectorielle dense \u00e0 l'aide d'un mod\u00e8le encodeur. \u00ab Encoder un document \u00bb signifie le transformer en un vecteur de taille fixe qui capture son sens.",
    rag: "Un mod\u00e8le o\u00f9 des documents pertinents sont extraits d'une base de donn\u00e9es au moment de la requ\u00eate et inject\u00e9s dans le contexte du mod\u00e8le, lui fournissant des connaissances \u00e0 jour ou sp\u00e9cifiques \u00e0 un domaine sans r\u00e9entra\u00eenement. Votre propre moteur de recherche priv\u00e9 combin\u00e9 \u00e0 un LLM.",
    "vector-db": "Une base de donn\u00e9es optimis\u00e9e pour stocker et interroger des vecteurs d'embedding en utilisant la recherche approximative du plus proche voisin. Exemples : Pinecone, Weaviate, pgvector. La couche de stockage qui rend le RAG possible \u00e0 grande \u00e9chelle.",
    "latent-space": "L'espace math\u00e9matique abstrait o\u00f9 vivent les embeddings. Les concepts s\u00e9mantiquement similaires se regroupent ; les analogies apparaissent comme de l'arithm\u00e9tique vectorielle (roi moins homme plus femme \u00e9gale reine). La g\u00e9om\u00e9trie de cet espace est ce qui rend la recherche s\u00e9mantique possible.",
    temperature: "Un nombre (g\u00e9n\u00e9ralement de 0 \u00e0 2) qui contr\u00f4le le caract\u00e8re al\u00e9atoire des sorties du mod\u00e8le. Une temp\u00e9rature basse (vers 0) signifie d\u00e9terministe et r\u00e9p\u00e9titif. Une temp\u00e9rature \u00e9lev\u00e9e (vers 2) signifie cr\u00e9atif et impr\u00e9visible. La plupart des cas d'utilisation en production se situent entre 0,2 et 0,9.",
    "top-p": "Une strat\u00e9gie d'\u00e9chantillonnage qui restreint le mod\u00e8le \u00e0 ne consid\u00e9rer que le plus petit ensemble de tokens dont la probabilit\u00e9 cumul\u00e9e d\u00e9passe p. Par exemple, top-p=0,9 ignore les 10% des tokens les moins probables. Souvent utilis\u00e9 conjointement avec la temp\u00e9rature.",
    logits: "Les scores bruts non normalis\u00e9s que le mod\u00e8le produit pour chaque token suivant possible avant l'\u00e9chantillonnage. Les logits sont convertis en probabilit\u00e9s via softmax, puis \u00e9chantillonn\u00e9s en fonction des r\u00e9glages de temp\u00e9rature et de top-p.",
    "fine-tuning": "La poursuite de l'entra\u00eenement d'un mod\u00e8le de base sur un ensemble de donn\u00e9es sp\u00e9cialis\u00e9 et soigneusement s\u00e9lectionn\u00e9 pour sp\u00e9cialiser son comportement. Plus efficace que l'entra\u00eenement \u00e0 partir de z\u00e9ro, mais n\u00e9cessite des donn\u00e9es de qualit\u00e9 et peut provoquer un \u00ab oubli catastrophique \u00bb des connaissances ant\u00e9rieures.",
    rlhf: "Une technique d'entra\u00eenement o\u00f9 des \u00e9valuateurs humains classent les sorties du mod\u00e8le, et ces pr\u00e9f\u00e9rences entra\u00eenent un mod\u00e8le de r\u00e9compense, qui guide ensuite le LLM via l'apprentissage par renforcement pour produire des r\u00e9ponses plus utiles, inoffensives et honn\u00eates. Utilis\u00e9 par Claude, GPT-4 et d'autres.",
    hallucination: "Lorsqu'un mod\u00e8le g\u00e9n\u00e8re avec confiance des informations factuellement incorrectes ou fabriqu\u00e9es. Cela se produit car les LLMs sont entra\u00een\u00e9s \u00e0 produire un texte qui semble plausible, pas des faits v\u00e9rifi\u00e9s. Les techniques de RAG et d'ancrage aident \u00e0 att\u00e9nuer ce ph\u00e9nom\u00e8ne.",
    lora: "Une technique de fine-tuning efficace qui g\u00e8le les poids du mod\u00e8le de base et ajoute de petites matrices d'adaptation entra\u00eenables. S'entra\u00eene en une fraction du temps et de la m\u00e9moire du fine-tuning complet, tout en atteignant des r\u00e9sultats comparables. La m\u00e9thode de fine-tuning dominante en pratique.",
    distillation: "L'entra\u00eenement d'un mod\u00e8le \u00ab \u00e9l\u00e8ve \u00bb plus petit pour imiter les sorties d'un mod\u00e8le \u00ab enseignant \u00bb plus grand. L'\u00e9l\u00e8ve apprend non seulement les bonnes r\u00e9ponses mais aussi les distributions de probabilit\u00e9 de l'enseignant, capturant des connaissances nuanc\u00e9es. Comment de nombreux petits mod\u00e8les efficaces sont cr\u00e9\u00e9s.",
    evals: "Des tests syst\u00e9matiques utilis\u00e9s pour mesurer les capacit\u00e9s, la pr\u00e9cision ou la s\u00e9curit\u00e9 d'un mod\u00e8le sur des t\u00e2ches sp\u00e9cifiques. De bonnes \u00e9valuations sont ce qui s\u00e9pare le d\u00e9veloppement rigoureux de l'IA de l'it\u00e9ration bas\u00e9e sur l'intuition. Tout, des benchmarks math\u00e9matiques aux tests d'intrusion (red-teaming).",
    "harness-engineering": "L'art de construire l'infrastructure pour ex\u00e9cuter des \u00e9valuations \u00e0 grande \u00e9chelle : ex\u00e9cuteurs de tests, pipelines de jeux de donn\u00e9es, logique de scoring et suivi des r\u00e9sultats. Un harnais d'\u00e9valuation bien con\u00e7u est ce qui permet d'it\u00e9rer sur un mod\u00e8le de mani\u00e8re s\u00fbre et rapide.",
    dogfooding: "La pratique qui consiste \u00e0 utiliser votre propre LLM ou vos outils bas\u00e9s sur l'IA en interne dans le cadre de votre propre flux de d\u00e9veloppement avant de les livrer aux clients. Les laboratoires d'IA utilisent leurs mod\u00e8les fronti\u00e8res pour \u00e9crire du code, g\u00e9n\u00e9rer des \u00e9valuations, r\u00e9diger des recherches et ex\u00e9cuter des outils internes. La valeur technique est que l'utilisation interne r\u00e9elle r\u00e9v\u00e8le des modes d'\u00e9chec que les benchmarks ne d\u00e9tectent pas : \u00e9puisement du contexte sous des charges de travail r\u00e9alistes, points de latence douloureux et cas limites d'utilisation d'outils que les tests structur\u00e9s n'atteignent jamais. Cela produit \u00e9galement des donn\u00e9es de pr\u00e9f\u00e9rence de haute qualit\u00e9 qui alimentent les pipelines RLHF. Qualitativement diff\u00e9rent des \u00e9valuations car les utilisateurs ont un contexte approfondi sur ce que le mod\u00e8le devrait \u00eatre capable de faire.",
    "prompt-engineering": "La pratique consistant \u00e0 concevoir soigneusement les entr\u00e9es textuelles d'un mod\u00e8le pour obtenir des sorties meilleures et plus fiables : en utilisant des techniques comme les exemples few-shot, le chain-of-thought, les instructions de r\u00f4le et les contraintes de format de sortie.",
    "context-engineering": "La discipline plus large qui consiste \u00e0 d\u00e9cider quelles informations entrent dans la fen\u00eatre de contexte du mod\u00e8le : non seulement le prompt, mais aussi les documents r\u00e9cup\u00e9r\u00e9s, les r\u00e9sultats d'outils, la m\u00e9moire, l'historique de conversation, et comment tout cela est structur\u00e9 et prioris\u00e9.",
    "system-prompt": "Un bloc d'instructions cach\u00e9 envoy\u00e9 au d\u00e9but d'une conversation qui d\u00e9finit la personnalit\u00e9, les r\u00e8gles et le comportement du mod\u00e8le avant l'arriv\u00e9e de tout message utilisateur. Le principal m\u00e9canisme que les op\u00e9rateurs utilisent pour personnaliser le comportement des LLMs pour leur produit.",
    "chain-of-thought": "Une technique de prompting qui demande au mod\u00e8le de raisonner \u00e9tape par \u00e9tape avant de donner une r\u00e9ponse finale. Am\u00e9liore consid\u00e9rablement les performances sur les t\u00e2ches de raisonnement complexes. La base des mod\u00e8les de \u00ab r\u00e9flexion \u00bb comme le mode de r\u00e9flexion \u00e9tendue de Claude.",
    react: "Un mod\u00e8le de prompting qui entrelace les traces de raisonnement avec les actions d'outils : le mod\u00e8le pense \u00e0 voix haute (\u00ab Pens\u00e9e : Je dois rechercher X \u00bb), appelle un outil (\u00ab Action : rechercher(X) \u00bb), observe le r\u00e9sultat et r\u00e9p\u00e8te. Le plan directeur derri\u00e8re la plupart des agents IA modernes.",
    "few-shot": "Zero-shot : demander au mod\u00e8le d'effectuer une t\u00e2che sans aucun exemple. Few-shot : fournir 2 \u00e0 5 exemples d'entr\u00e9e/sortie dans le prompt pour que le mod\u00e8le reconnaisse le format par similarit\u00e9. Le few-shot est l'une des techniques les plus fiables et les plus sous-utilis\u00e9es en prompt engineering.",

        body: "The mechanism by which LLMs can invoke external functions or APIs: like running code, searching the web, or querying a database: by outputting structured JSON that the host application executes and feeds back as a result.",
        related: ["AI Agent", "MCP", "ReAct", "Structured Output"]
      },
      {
        id: "mcp",
        name: "MCP",
        fullName: "Model Context Protocol",
        body: "Anthropic's open protocol for connecting LLMs to external tools and data sources in a standardized way. Any MCP-compatible server can plug into any MCP-compatible model or IDE.",
        related: ["Tool Use", "AI Agent", "Context Engineering"]
      },
      {
        id: "grounding",
        name: "Grounding",
        fullName: "Factual Grounding",
        body: "Connecting model outputs to verifiable external sources: search results, databases, real-time APIs: to reduce hallucination and keep answers accurate. RAG is one form of grounding; web search is another.",
        related: ["RAG", "Hallucination", "Tool Use"]
      },
      {
        id: "prompt-injection",
        name: "Prompt Injection",
        fullName: "Indirect Prompt Injection",
        body: "An attack where malicious instructions are hidden in content the agent reads (a webpage, email, document) and hijack its behavior. For example, a webpage telling the agent to ignore its instructions and exfiltrate data. The SQL injection of the AI era.",
        related: ["AI Agent", "Grounding", "System Prompt"]
      },
      {
        id: "guardrails",
        name: "Guardrails",
        fullName: "Safety Guardrails",
        body: "Validation layers that sit around an LLM to detect and block unsafe inputs or outputs: harmful content, PII leakage, off-topic requests, prompt injection attempts. Can be implemented as input filters, output classifiers, or both. The primary mechanism for enforcing policy in production deployments without retraining the model itself.",
        related: ["Prompt Injection", "RLHF", "System Prompt", "Evals"]
      },
      {
        id: "agent-sandbox",
        name: "Agent Sandbox",
        fullName: "Isolated Execution Sandbox",
        body: "An isolated environment where an AI agent runs code or executes actions with restricted access to the host system. Prevents a compromised or misbehaving agent from touching the filesystem, network, or processes outside its allowed scope. Critical for any agent that executes untrusted or LLM-generated code.",
        related: ["AI Agent", "Tool Use", "Prompt Injection"]
      }
    ]
  }
];

// ─── Lookups ──────────────────────────────────────────────────────────────────
const termById = new Map();
const termByName = new Map();
const categoryBySlug = new Map();
const categoryForTerm = new Map();

for (const cat of GLOSSARY) {
  categoryBySlug.set(cat.slug, cat);
  for (const term of cat.terms) {
    termById.set(term.id, term);
    termByName.set(term.name.toLowerCase(), term);
    categoryForTerm.set(term.id, cat);
  }
}

function findTermByName(name) {
  return termByName.get(name.toLowerCase()) || null;
}

function escape(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function firstSentence(str) {
  const m = str.match(/^[^.!?]+[.!?]/);
  return m ? m[0] : str.slice(0, 120);
}

// ─── Sidebar ──────────────────────────────────────────────────────────────────
function renderSidebar(activeCatSlug, activeTermId) {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = GLOSSARY.map(cat => {
    const isActive = cat.slug === activeCatSlug;
    const summaryClass = isActive
      ? 'flex items-center justify-between px-3 py-2 cursor-pointer rounded-sm bg-surface text-primary text-sm font-medium border-l-2 border-primary select-none'
      : 'flex items-center justify-between px-3 py-2 cursor-pointer rounded-sm hover:bg-surface text-text-main text-sm font-medium transition-colors select-none';
    const arrowClass = isActive ? 'material-symbols-outlined text-primary text-[18px] arrow' : 'material-symbols-outlined text-muted text-[18px] arrow';
    const termLinks = cat.terms.map(term => {
      const isActiveTerm = term.id === activeTermId;
      const cls = isActiveTerm
        ? 'text-sm font-mono text-primary block py-1'
        : 'text-sm font-mono text-muted hover:text-text-main transition-colors block py-1';
      return `<a class="${cls}" href="#${term.id}">${escape(term.name)}</a>`;
    }).join('');
    return `
      <details class="group" ${isActive ? 'open' : ''}>
        <summary class="${summaryClass}">
          <a href="#${cat.slug}" class="flex-1" onclick="event.stopPropagation()">${escape(gc(cat.category))}</a>
          <span class="${arrowClass}">keyboard_arrow_down</span>
        </summary>
        <div class="pl-6 pr-3 py-2 flex flex-col gap-1">${termLinks}</div>
      </details>`;
  }).join('');

  // Update nav-home active state
  const navHome = document.getElementById('nav-home');
  if (!activeCatSlug && !activeTermId) {
    navHome.className = 'text-primary text-sm font-medium leading-normal';
  } else {
    navHome.className = 'text-text-main text-sm font-medium leading-normal hover:text-primary transition-colors';
  }
}

// ─── Right Sidebar ────────────────────────────────────────────────────────────
function renderRightSidebar(items, title) {
  const aside = document.getElementById('right-sidebar');
  if (!items || items.length === 0) {
    aside.innerHTML = '';
    return;
  }
  const links = items.map((item, i) => {
    const isFirst = i === 0;
    const cls = isFirst
      ? 'block pl-4 text-[13px] font-medium text-text-main border-l-2 border-primary -ml-[1px]'
      : 'block pl-4 text-[13px] font-medium text-muted hover:text-text-main transition-colors -ml-[1px]';
    return `<li><a class="${cls}" href="#${item.id}">${escape(item.name)}</a></li>`;
  }).join('');
  aside.innerHTML = `
    <div class="mb-4">
      <h3 class="text-xs font-semibold text-muted uppercase tracking-wider">${escape(title)}</h3>
    </div>
    <ul class="space-y-3 border-l border-border-color">${links}</ul>`;
}

// ─── Views ────────────────────────────────────────────────────────────────────
function renderHome() {
  renderSidebar('', '');
  renderRightSidebar([], '');

  const totalTerms = GLOSSARY.reduce((n, c) => n + c.terms.length, 0);
  const cards = GLOSSARY.map(cat => `
    <a href="#${cat.slug}" class="category-card block border border-border-color rounded-lg p-6 cursor-pointer">
      <div class="flex items-start justify-between mb-3">
        <h2 class="text-text-main font-semibold text-[17px] leading-snug">${escape(gc(cat.category))}</h2>
        <span class="text-muted text-xs border border-border-color rounded px-2 py-0.5 ml-3 shrink-0">${cat.terms.length}</span>
      </div>
      <p class="text-muted text-sm leading-relaxed">${escape(gd(cat))}</p>
    </a>`).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="relative">
      <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[500px] h-[200px] bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
      <header class="mb-12 relative z-10 max-w-2xl">
        <h1 class="text-5xl font-display font-semibold tracking-tight gradient-text mb-4">${currentLang==="fr"?FR.ui.llmFieldNotes:"LLM Field Notes"}</h1>
        <p class="text-muted text-lg leading-relaxed">${currentLang==="fr"?"Un glossaire pratique de "+totalTerms+" termes pour les ing\u00e9nieurs qui construisent avec l"+String.fromCharCode(39)+"IA. Sans bla-bla \u2014 juste ce que vous devez savoir et pourquoi c"+String.fromCharCode(39)+"est important.":"A practical glossary of "+totalTerms+" terms for engineers building with AI. No fluff \u2014 just what you need to know and why it matters."}</p>
      </header>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3 relative z-10">${cards}</div>
      <div class="mt-12 flex justify-center">
        <a href="${GITHUB_REPO}/issues/new" target="_blank" rel="noopener"
          class="bg-surface hover:bg-surface-hover border border-border-color text-text-main px-4 py-2 rounded-sm text-sm font-medium transition-colors flex items-center gap-2">
          <span class="material-symbols-outlined text-[16px]">add</span>
          ${currentLang==='fr'?FR.ui.proposeTerm:'Propose a term on GitHub'}
        </a>
      </div>
    </div>`;
}

function renderCategory(cat) {
  renderSidebar(cat.slug, '');
  renderRightSidebar(cat.terms, currentLang==='fr' ? FR.ui.inThisCategory : 'In this category');

  const rows = cat.terms.map(term => `
    <a class="term-row flex items-center w-full min-h-[80px] py-4 px-4 -mx-4 rounded-sm group" href="#${term.id}">
      <div class="flex flex-col gap-1 w-full">
        <div class="flex items-center justify-between">
          <h2 class="text-[18px] font-mono font-medium text-text-main group-hover:text-primary transition-colors">${escape(term.name)}</h2>
          <span class="material-symbols-outlined text-muted opacity-0 group-hover:opacity-100 transition-opacity">arrow_forward</span>
        </div>
        <p class="text-[15px] text-muted line-clamp-1">${escape(firstSentence(gb(term)))}</p>
      </div>
    </a>`).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="relative">
      <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[600px] h-[200px] bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
      <header class="mb-12 relative z-10">
        <div class="flex items-center gap-2 text-muted text-sm mb-4">
          <a class="hover:text-primary transition-colors" href="#">${currentLang==='fr'?FR.ui.categories:'Categories'}</a>
          <span class="material-symbols-outlined text-[14px]">chevron_right</span>
          <span class="text-text-main">${escape(gc(cat.category))}</span>
        </div>
        <h1 class="text-5xl font-display font-semibold tracking-tight gradient-text mb-4">${escape(gc(cat.category))}</h1>
        <p class="text-muted text-lg leading-relaxed">${escape(gd(cat))}</p>
      </header>
      <div class="flex flex-col border-t border-border-color">${rows}</div>
      <div class="mt-12 flex justify-center">
        <a href="${GITHUB_REPO}/issues/new" target="_blank" rel="noopener"
          class="bg-surface hover:bg-surface-hover border border-border-color text-text-main px-4 py-2 rounded-sm text-sm font-medium transition-colors flex items-center gap-2">
          <span class="material-symbols-outlined text-[16px]">add</span>
          ${currentLang==='fr'?FR.ui.proposeTerm:'Propose a term on GitHub'}
        </a>
      </div>
    </div>`;
}

function renderTerm(term) {
  const cat = categoryForTerm.get(term.id);
  renderSidebar(cat ? cat.slug : '', term.id);

  // Related items for right sidebar
  const relatedItems = term.related
    .map(name => findTermByName(name))
    .filter(Boolean)
    .map(t => ({ id: t.id, name: t.name }));
  renderRightSidebar(relatedItems, currentLang==='fr' ? FR.ui.relatedTerms : 'Related terms');

  const relatedPills = term.related.map(name => {
    const t = findTermByName(name);
    if (t) {
      return `<a href="#${t.id}" class="inline-flex items-center px-3 py-1 rounded-full border border-border-color text-sm text-muted hover:text-text-main hover:border-primary transition-colors">${escape(name)}</a>`;
    }
    return `<span class="inline-flex items-center px-3 py-1 rounded-full border border-border-color text-sm text-muted">${escape(name)}</span>`;
  }).join('');

  const breadcrumbCat = cat
    ? `<a class="hover:text-primary transition-colors" href="#">${currentLang==='fr'?FR.ui.categories:'Categories'}</a>
       <span class="material-symbols-outlined text-[14px]">chevron_right</span>
       <a class="hover:text-primary transition-colors" href="#${cat.slug}">${escape(gc(cat.category))}</a>
       <span class="material-symbols-outlined text-[14px]">chevron_right</span>
       <span class="text-text-main">${escape(term.name)}</span>`
    : `<span class="text-text-main">${escape(term.name)}</span>`;

  document.getElementById('main-content').innerHTML = `
    <div class="relative max-w-2xl">
      <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[500px] h-[200px] bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
      <header class="mb-10 relative z-10">
        <div class="flex items-center gap-2 text-muted text-sm mb-4 flex-wrap">${breadcrumbCat}</div>
        <h1 class="text-5xl font-display font-semibold tracking-tight gradient-text mb-2">${escape(term.name)}</h1>
        ${term.fullName !== term.name ? `<p class="text-muted text-base">${escape(term.fullName)}</p>` : ''}
      </header>
      <div class="relative z-10">
        <p class="text-text-main text-lg leading-relaxed mb-10">${escape(gb(term))}</p>
        ${relatedPills ? `
        <div>
          <h3 class="text-xs font-semibold text-muted uppercase tracking-wider mb-4">${currentLang==='fr'?FR.ui.related:'Related'}</h3>
          <div class="flex flex-wrap gap-2">${relatedPills}</div>
        </div>` : ''}
        <div class="mt-12 pt-8 border-t border-border-color flex items-center justify-between">
          ${cat ? `<a href="#${cat.slug}" class="text-sm text-muted hover:text-primary transition-colors flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">arrow_back</span> ${escape(gc(cat.category))}</a>` : '<span></span>'}
          <a href="${GITHUB_REPO}/issues/new" target="_blank" rel="noopener"
            class="bg-surface hover:bg-surface-hover border border-border-color text-text-main px-4 py-2 rounded-sm text-sm font-medium transition-colors flex items-center gap-2">
            <span class="material-symbols-outlined text-[16px]">edit</span>
            ${currentLang==='fr'?FR.ui.suggestEdit:'Suggest an edit'}
          </a>
        </div>
      </div>
    </div>`;

  // Scroll active term into view in right sidebar
  setTimeout(() => {
    const active = document.querySelector('#right-sidebar a.text-text-main');
    if (active) active.scrollIntoView({ block: 'nearest' });
  }, 0);
}

// ─── Router ───────────────────────────────────────────────────────────────────
function route() {
  const hash = location.hash.slice(1);
  window.scrollTo(0, 0);

  if (!hash) {
    return renderHome();
  }

  const cat = categoryBySlug.get(hash);
  if (cat) return renderCategory(cat);

  const term = termById.get(hash);
  if (term) return renderTerm(term);

  // Fallback to home
  renderHome();
}

// ─── Search ───────────────────────────────────────────────────────────────────
let searchSelectedIndex = -1;

function setSearchIndex(newIndex) {
  const results = document.querySelectorAll('#search-results .search-result');
  if (results.length === 0) return;
  results.forEach(r => r.classList.remove('search-result-active'));
  searchSelectedIndex = Math.max(0, Math.min(newIndex, results.length - 1));
  results[searchSelectedIndex].classList.add('search-result-active');
  results[searchSelectedIndex].scrollIntoView({ block: 'nearest' });
}

function openSearch() {
  document.getElementById('search-modal').classList.add('open');
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').innerHTML = '';
  searchSelectedIndex = -1;
  document.getElementById('search-input').focus();
  showAllResults('');
}

function closeSearch() {
  document.getElementById('search-modal').classList.remove('open');
}

function showAllResults(q) {
  searchSelectedIndex = -1;
  const container = document.getElementById('search-results');
  const lower = q.toLowerCase();
  const allTerms = [];
  for (const cat of GLOSSARY) {
    for (const term of cat.terms) {
      allTerms.push({ term, cat });
    }
  }

  const filtered = lower
    ? allTerms.filter(({ term }) =>
        term.name.toLowerCase().includes(lower) ||
        term.fullName.toLowerCase().includes(lower))
    : allTerms;

  if (filtered.length === 0) {
    container.innerHTML = `<p class="text-muted text-sm text-center py-6">${currentLang==='fr'?FR.ui.noResultsFor:'No results for'} "${escape(q)}"</p>`;
    return;
  }

  container.innerHTML = filtered.map(({ term, cat }) => `
    <a href="#${term.id}" onclick="closeSearch()"
      class="search-result flex items-center justify-between px-4 py-3 cursor-pointer transition-colors">
      <div>
        <div class="text-text-main text-sm font-medium">${escape(term.name)}</div>
        <div class="text-muted text-xs mt-0.5">${escape(gc(cat.category))}</div>
      </div>
      <span class="material-symbols-outlined text-muted text-[16px]">arrow_forward</span>
    </a>`).join('');
}

// ─── Init ─────────────────────────────────────────────────────────────────────
window.addEventListener('hashchange', route);
document.addEventListener('DOMContentLoaded', () => {
  route();
  updateStaticUI();

  // Search triggers
  document.getElementById('search-trigger').addEventListener('click', openSearch);
  document.getElementById('search-trigger-mobile').addEventListener('click', openSearch);
  document.getElementById('lang-toggle').addEventListener('click', toggleLang);
  document.getElementById('search-close').addEventListener('click', closeSearch);

  // Close on backdrop click
  document.getElementById('search-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('search-modal')) closeSearch();
  });

  // Search input
  document.getElementById('search-input').addEventListener('input', e => {
    showAllResults(e.target.value);
  });

  document.getElementById('search-input').addEventListener('keydown', e => {
    const results = document.querySelectorAll('#search-results .search-result');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      setSearchIndex(searchSelectedIndex < 0 ? 0 : searchSelectedIndex + 1);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (searchSelectedIndex > 0) setSearchIndex(searchSelectedIndex - 1);
    } else if (e.key === 'Enter' && searchSelectedIndex >= 0 && results[searchSelectedIndex]) {
      results[searchSelectedIndex].click();
    }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      openSearch();
    }
    if (e.key === 'Escape') closeSearch();
  });
});
</script>
